name: 📊 포트폴리오 카카오톡 알림

on:
  schedule:
    # 💡 UTC 20:15 = KST 다음날 오전 05:15
    # 정각('0 20')을 피해서 '15 20'으로 세팅해야 GitHub 서버 지연 없이 5시 15분에 정상 실행됩니다.
    - cron: '15 20 * * *'
  workflow_dispatch:

jobs:
  send-portfolio-alert:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: pip install requests pytz

      - name: 🚀 포트폴리오 알림 실행
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          # 💡 리프레시 토큰 환경 변수를 반드시 여기에 주입해줘야 매일 새벽 자동으로 토큰을 갱신합니다.
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python portfolio_alert.py
